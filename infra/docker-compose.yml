services:
    mysql84:
        image: mysql:8.4
        container_name: c-pm-mysql84
        restart: "no"
        environment:
            MYSQL_ROOT_PASSWORD: password
        ports:
            - "33061:3306"
        volumes:
            - mysql_data:/var/lib/mysql
            - ./db/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
        networks:
            - dev-net

    postgres18:
        image: postgres:18
        container_name: c-pe-postgres18
        restart: "no"
        environment:
            POSTGRES_PASSWORD: password
        ports:
            - "54321:5432"
        volumes:
            - postgres_data:/var/lib/postgresql
            - ./db/postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
        command: postgres -c config_file=/etc/postgresql/postgresql.conf
        networks:
            - dev-net

    mariadb114:
        image: mariadb:11.4
        container_name: c-bd-mariadb114
        restart: "no"
        environment:
            MARIADB_ROOT_PASSWORD: password
        ports:
            - "33062:3306"
        volumes:
            - mariadb_data:/var/lib/mysql
            - ./db/mariadb/my.cnf:/etc/mysql/conf.d/custom.cnf:ro
        networks:
            - dev-net

networks:
    dev-net:
        name: dev-net

volumes:
    mysql_data:
    postgres_data:
    mariadb_data: